<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Happy Picnic - Grade 5 English Storybook</title>
    <style>
        :root {
            --btn-main: #ff6f61;
        }

        body {
            background: #fdf6e3;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        /* 绘本主容器 */
        .book-container {
            width: 1000px;
            height: 650px;
            background: white;
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border-radius: 25px;
            border: 12px solid #fff;
            overflow: hidden;
            position: relative;
        }

        /* 左侧：插图区 */
        .illustration-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-right: 2px solid #f0f0f0;
            transition: all 0.3s ease;
        }

        /* 右侧：文字内容区 */
        .text-panel {
            flex: 1.2;
            padding: 25px 40px; 
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            overflow: hidden; /* 彻底禁止滚动条 */
        }

        /* 场景背景 */
        .scene { 
            width: 100%; height: 100%; 
            position: absolute; display: none; 
            top: 0; left: 0;
        }
        .scene.active { display: block; animation: fadeIn 0.6s ease; }

        .bg-cover { background: linear-gradient(135deg, #ffb6c1 0%, #87ceeb 35%, #ffd700 70%, #b2feca 100%); }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .float-1 { animation: float 4s ease-in-out infinite; }
        .float-2 { animation: float 5s ease-in-out infinite 1s; }
        .float-3 { animation: float 4.5s ease-in-out infinite 0.5s; }
        .float-4 { animation: float 5.5s ease-in-out infinite 1.5s; }

        .season-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* 夏天：优先保留右上角的完整太阳 */
        #img2 .season-img {
            object-position: 92% 8%;
        }

        .item { position: absolute; transition: all 0.5s ease-out; }

        /* ---------------- 排版与文字格式 ---------------- */
        h2 { 
            color: var(--btn-main); 
            font-size: 26px; 
            margin: 0 0 15px 0; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px; 
        }
        
        .word-hl { background: #ffebee; color: #c62828; font-weight: bold; padding: 2px 6px; border-radius: 6px; } 
        .sent-hl-question { background: #e8f5e9; color: #1b5e20; font-weight: bold; padding: 2px 6px; border-radius: 6px; } 
        .sent-hl-answer { background: #e8f5e9; color: #1b5e20; font-weight: bold; padding: 2px 6px; border-radius: 6px; } 

        /* 句子列表容器，无滚动条 */
        .sentences-container {
            flex: 1;
            overflow: hidden; 
        }

        /* 保持行间距不变：每段的留白 */
        .sentence-block {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 2px dashed #e0e0e0; 
        }
        .sentence-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .sentence-en {
            font-size: 19px;
            line-height: 1.6;
            color: #333;
            display: inline; 
        }

        /* 紧跟文字的按钮组 */
        .inline-btns {
            display: inline-flex;
            gap: 8px;
            vertical-align: middle;
            margin-left: 8px;
            margin-bottom: 4px;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #dcdcdc;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.06);
            transition: all 0.2s ease;
        }
        .icon-btn:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 翻译展开框 */
        .translation-box {
            display: none;
            margin-top: 8px;
            font-size: 16px;
            color: #e65100;
            background: #fff3e0;
            padding: 8px 15px;
            border-radius: 8px;
            border-left: 4px solid #ffb74d;
        }

        /* 底部导航 */
        .nav-controls { margin-top: 20px; display: flex; align-items: center; gap: 40px; }
        .nav-btn {
            background: var(--btn-main); color: white; border: none;
            padding: 10px 50px; border-radius: 30px; font-size: 18px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(255,111,97,0.3);
        }
        .nav-btn:disabled { background: #cfd8dc; cursor: not-allowed; }
        .page-num { font-size: 18px; font-weight: bold; color: #b0bec5; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

                textPanel.innerHTML = ''; 
                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
                document.getElementById('img0').classList.add('active');
            } else {
                textPanel.style.display = 'flex';
                illPanel.style.borderRight = '2px solid #f0f0f0';

                let html = `<h2>${data.title}</h2>`;
                html += `<div class="sentences-container">`;
                
                data.sentences.forEach((s, index) => {
                    html += `
                    <div class="sentence-block">
                        <div class="sentence-en">${s.en}</div>
                        <div class="inline-btns">
                            <button class="icon-btn" onclick="speak(${cur}, ${index})" title="跟读">🔊</button>
                            <button class="icon-btn" style="color:#f57c00;" onclick="toggleT(${cur}, ${index})" title="翻译">中</button>
                        </div>
                        <div id="t_${cur}_${index}" class="translation-box">${s.zh}</div>
                    </div>`;
                });
                
                html += `</div>`;
                textPanel.innerHTML = html;

                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
                document.getElementById(data.bgId).classList.add('active');
            }
            
            document.getElementById('pBtn').disabled = cur === 0;
            document.getElementById('nBtn').disabled = cur === storyData.length - 1;
            document.getElementById('curPage').innerText = cur + 1;

        }

        function turn(dir) {
            cur += dir;
            window.speechSynthesis.cancel();
            refresh();
        }

        // 手风琴式展开逻辑：打开当前翻译时，自动关闭其他翻译，以保证即使全5句也不会越界
        function toggleT(c, i) {
            const currentEl = document.getElementById('t_' + c + '_' + i);
            const isCurrentlyBlock = (currentEl.style.display === 'block');

            // 隐藏同页面的其他所有翻译框
            document.querySelectorAll('.translation-box').forEach(el => {
                el.style.display = 'none';
            });

            // 切换当前点击框的状态
            if (!isCurrentlyBlock) {
                currentEl.style.display = 'block';
            }
        }

        function speak(c, i) {
            window.speechSynthesis.cancel();
            const rawText = storyData[c].sentences[i].en;
            const cleanText = rawText.replace(/<[^>]*>?/gm, '').replace(/[“”""]/g, '');
            const msg = new SpeechSynthesisUtterance(cleanText);
            msg.lang = 'en-US';
            msg.rate = 0.85; 
            window.speechSynthesis.speak(msg);
        }

        refresh();
    </script>
</body>
</html>
